name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Where?
      options:
        - web app (frontend)
        - signaling server
        - not sure
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 140 on Windows 11
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console / network errors
      description: Paste any errors from the browser console or the server logs.
      render: shell
